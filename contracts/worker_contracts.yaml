# ─────────────────────────────────────────────────────────────────────────────
# SYNTHESIS WORKER
# ─────────────────────────────────────────────────────────────────────────────

synthesis_worker:
  name: "synthesis_worker"
  file: "workers/synthesis.py"
  role: "Answer Composer — tổng hợp câu trả lời có citation, không hallucinate"
  description: >
    Tổng hợp final_answer từ retrieved_chunks và/hoặc policy_result.
    Gọi LLM với grounded prompt — chỉ dùng evidence trong state.
    Abstain nếu không có chunks.

  input:
    required:
      task:
        type: string
        source: "state['task']"
    optional:
      retrieved_chunks:
        type: "list[ChunkDict]"
        source: "state.get('retrieved_chunks', [])"
      policy_result:
        type: dict
        source: "state.get('policy_result', {})"

  output:
    final_answer:
      type: string
      required: true
      abstain_value: "Không đủ thông tin để trả lời câu hỏi này."
      description: "Câu trả lời có citation dạng [1] hoặc [source_name]"

    sources:
      type: "list[str]"
      required: true
      description: "Danh sách sources được cite trong final_answer"

    confidence:
      type: float
      required: true
      range: "[0.0, 1.0]"
      thresholds:
        high: ">= 0.7"
        medium: "0.4 – 0.69"
        low: "< 0.4 → khuyến khích trigger HITL"

    hitl_triggered:
      type: boolean
      required: true
      default: false

    worker_io_logs:
      type: list
      write_mode: "append"

  state_mutations:
    reads:
      - "state['task']"
      - "state.get('retrieved_chunks', [])"
      - "state.get('policy_result', {})"
    writes:
      - "state['final_answer']"
      - "state['sources']"
      - "state['confidence']"
      - "state['hitl_triggered']"
      - "state['workers_called'].append('synthesis_worker')"
      - "state['worker_io_logs'].append(log_entry)"
      - "state['history'].append(summary_string)"

  grounding_rules:
    - "System prompt phải chứa: 'Answer ONLY using the provided context. Do not use outside knowledge.'"
    - "Nếu retrieved_chunks=[] → KHÔNG gọi LLM, trả abstain_value trực tiếp"
    - "Mỗi claim trong answer phải có citation tương ứng với source trong retrieved_chunks"

  constraints:
    - "KHÔNG hallucinate — nếu chunks không đủ → abstain"
    - "citation [1] phải tương ứng với retrieved_chunks[0]['source']"
    - "confidence < 0.4 → hitl_triggered=true"

  implementation:
    status: "TODO Sprint 2"


# ─────────────────────────────────────────────────────────────────────────────
# MCP SERVER
# ─────────────────────────────────────────────────────────────────────────────

mcp_server:
  name: "mcp_server"
  file: "mcp_server.py"
  description: >
    Mock MCP Server expose tools cho workers qua dispatch_tool().
    Policy Tool Worker gọi MCP thay vì truy cập ChromaDB trực tiếp.

  interface:
    dispatch_tool:
      signature: "dispatch_tool(tool_name: str, input_dict: dict) -> dict"
      on_unknown_tool: "{'error': 'tool_not_found', 'tool': tool_name}"
      never_raise: true
    list_tools:
      signature: "list_tools() -> list[dict]"

  tools:
    search_kb:
      description: "Tìm kiếm Knowledge Base — ChromaDB day09_docs"
      input:
        query: {type: string, required: true}
        top_k: {type: integer, default: 3}
      output:
        chunks: list
        sources: list
        total_found: integer

    get_ticket_info:
      description: "Tra cứu thông tin ticket theo ID (mock data)"
      input:
        ticket_id: {type: string, required: true, example: "P1-LATEST"}
      output:
        ticket_id: string
        priority: string
        status: string
        assignee: string
        created_at: string
        sla_deadline: string
        notifications_sent: list

    check_access_permission:
      description: "Kiểm tra quyền cấp access theo level và role"
      input:
        access_level: {type: integer, enum: [1, 2, 3]}
        requester_role: {type: string}
        is_emergency: {type: boolean, default: false}
      output:
        can_grant: boolean
        required_approvers: list
        emergency_override: boolean
        notes: list
        source: string

    create_ticket:
      description: "Tạo ticket mới (mock)"
      input:
        priority: {type: string, enum: ["P1", "P2", "P3", "P4"]}
        title: string
        description: string
      output:
        ticket_id: string
        url: string
        created_at: string

  constraints:
    - "dispatch_tool() trả error dict nếu tool không tồn tại — không raise"
    - "list_tools() trả đúng format MCP tool schema"
    - "Policy Tool Worker gọi qua dispatch_tool(), không gọi ChromaDB trực tiếp"
    - "Mỗi lần gọi phải ghi timestamp ISO 8601"

  implementation:
    status: "TODO Sprint 3"


# ─────────────────────────────────────────────────────────────────────────────
# AGENT STATE SCHEMA (shared dict truyền qua toàn graph)
# ─────────────────────────────────────────────────────────────────────────────

agent_state:
  description: >
    Dict được truyền qua toàn bộ graph.
    Mỗi worker chỉ đọc/ghi fields được khai báo trong contract của mình.
    Không được đọc/ghi fields của worker khác.

  fields:
    # ── Input fields (set bởi caller trước khi invoke graph) ──
    task:
      type: string
      set_by: "caller"
      read_by: ["supervisor", "retrieval_worker", "policy_tool_worker", "synthesis_worker"]

    retrieval_top_k:
      type: integer
      default: 3
      set_by: "caller (optional)"
      read_by: ["retrieval_worker"]

    # ── Supervisor fields ──
    supervisor_route:
      type: string
      write_by: "supervisor"
      read_by: ["graph.route_decision"]

    route_reason:
      type: string
      write_by: "supervisor"
      read_by: ["eval_trace", "debug"]

    risk_high:
      type: boolean
      write_by: "supervisor"
      read_by: ["synthesis_worker", "eval_trace"]

    needs_tool:
      type: boolean
      write_by: "supervisor"
      read_by: ["policy_tool_worker"]

    # ── Retrieval Worker fields ──
    retrieved_chunks:
      type: "list[ChunkDict]"
      default: "[]"
      write_by: "retrieval_worker"
      read_by: ["policy_tool_worker", "synthesis_worker"]

    retrieved_sources:
      type: "list[str]"
      default: "[]"
      write_by: "retrieval_worker"
      read_by: ["synthesis_worker", "eval_trace"]

    # ── Policy Tool Worker fields ──
    policy_result:
      type: dict
      write_by: "policy_tool_worker"
      read_by: ["synthesis_worker"]

    mcp_tools_used:
      type: list
      write_by: "policy_tool_worker"
      read_by: ["eval_trace"]

    # ── Synthesis Worker fields ──
    final_answer:
      type: string
      write_by: "synthesis_worker"
      read_by: ["output", "eval_trace"]

    sources:
      type: "list[str]"
      write_by: "synthesis_worker"
      read_by: ["eval_trace"]

    confidence:
      type: float
      write_by: "synthesis_worker"
      read_by: ["eval_trace", "hitl_logic"]

    hitl_triggered:
      type: boolean
      write_by: "synthesis_worker"
      read_by: ["eval_trace"]

    # ── Shared tracking fields (mọi worker đều append) ──
    workers_called:
      type: "list[str]"
      default: "[]"
      write_by: "mỗi worker tự append tên mình"
      read_by: ["eval_trace"]

    worker_io_logs:
      type: "list[LogEntry]"
      default: "[]"
      write_by: "mỗi worker append 1 entry"
      read_by: ["eval_trace", "debug"]

    history:
      type: "list[str]"
      default: "[]"
      write_by: "mỗi worker append 1 summary string"
      read_by: ["debug"]