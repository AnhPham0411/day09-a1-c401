# Worker Contracts — Day 09 Lab
# ═══════════════════════════════════════════════════════════════════════════════
# ĐÂY LÀ NGUỒN SỰ THẬT (source of truth).
# Code phải viết theo file này — KHÔNG phải ngược lại.
#
# Rule tổng quát:
#   Supervisor  → quyết định luồng (routing, risk)
#   Worker      → thực thi domain skill (retrieval / policy / synthesis)
#   Contract    → ranh giới rõ ràng giữa supervisor và worker
#
# Cách đọc file này:
#   input  → những gì worker được phép đọc từ AgentState
#   output → những gì worker CAM KẾT ghi vào AgentState
#   constraints → bất biến phải đúng, bất kể implementation thay đổi thế nào
# ═══════════════════════════════════════════════════════════════════════════════

version: "2.0"
updated_at: "2026-04-14"
authored_by: "design-first — code phải theo contract, không phải contract theo code"

# ─────────────────────────────────────────────────────────────────────────────
# INFRASTRUCTURE (shared config — tất cả workers đều dùng)
# ─────────────────────────────────────────────────────────────────────────────

infrastructure:
  vector_store:
    engine: "chromadb"
    persist_path: "./chroma_db"
    collection_name: "day09_docs"        # ← đổi từ day09_docs

  embedding:
    priority_1:
      library: "openai"
      model: "text-embedding-3-small"
      dimension: 1536
      requires_env: "OPENAI_API_KEY"
      reason: "khớp với index đã build sẵn trong chroma_db"
    priority_2:
      library: "sentence-transformers"
      model: "all-MiniLM-L6-v2"
      dimension: 384
      mode: "offline"
      reason: "fallback offline — cần rebuild index nếu dùng"
    priority_3:
      note: "random float[1536] seeded by hash(text)"
      warning: "KẾT QUẢ RETRIEVAL VÔ NGHĨA — chỉ dùng để unit test I/O contract"

# ─────────────────────────────────────────────────────────────────────────────
# SUPERVISOR
# ─────────────────────────────────────────────────────────────────────────────

supervisor:
  name: "supervisor"
  file: "graph.py"
  description: >
    Nhận task từ user, quyết định worker nào xử lý.
    KHÔNG tự trả lời — chỉ route.
    KHÔNG gọi ChromaDB hay LLM trực tiếp.

  input:
    task:
      type: string
      required: true
      description: "Câu hỏi từ user"

  output:
    supervisor_route:
      type: string
      enum: ["retrieval_worker", "policy_tool_worker", "human_review"]
      required: true

    route_reason:
      type: string
      required: true
      format: "[lý do route chính] | [cờ cảnh báo phụ nếu có]"
      example: "keyword 'SLA' -> retrieval | risk_high vì có 'P1'"
      constraint: "KHÔNG được rỗng hoặc 'unknown'"

    risk_high:
      type: boolean
      required: true
      set_true_when: "task chứa bất kỳ: ['khẩn cấp', 'emergency', 'lỗi', 'P1', 'flash sale']"

    needs_tool:
      type: boolean
      required: true
      description: "Cho phép policy_tool_worker gọi MCP tools"

  routing_rules:
    - priority: 1
      condition: "task chứa: ['hoàn tiền', 'refund', 'flash sale', 'cấp quyền', 'access level', 'license']"
      route: "policy_tool_worker"
    - priority: 2
      condition: "task chứa: ['P1', 'SLA', 'ticket', 'escalation', 'sự cố']"
      route: "retrieval_worker"
    - priority: 3
      condition: "task chứa mã lỗi dạng ERR-xxx mà không có context đủ để route"
      route: "human_review"
    - priority: 99
      condition: "mặc định"
      route: "retrieval_worker"

  constraints:
    - "Supervisor không tự trả lời domain questions"
    - "route_reason phải có mặt và có nghĩa — dùng để debug trace"
    - "Khi risk_high=true → route_reason phải ghi rõ keyword nào kích hoạt"
    - "Khi cả policy lẫn retrieval đều match → ưu tiên theo số priority (nhỏ hơn = cao hơn)"


# ─────────────────────────────────────────────────────────────────────────────
# RETRIEVAL WORKER  ← ĐÂY LÀ PHẦN ĐƯỢC VIẾT LẠI SẠCH
# ─────────────────────────────────────────────────────────────────────────────

retrieval_worker:
  name: "retrieval_worker"
  file: "workers/retrieval.py"
  role: "Data Finder — tìm bằng chứng từ kho tài liệu"
  description: >
    Embed câu hỏi → query ChromaDB → trả về top-k chunks liên quan nhất.
    KHÔNG tổng hợp, KHÔNG phán đoán — chỉ tìm và trả về raw evidence.
    Stateless: không lưu gì giữa các lần gọi, test độc lập được.

  # ── INPUT ────────────────────────────────────────────────────────────────
  input:
    required:
      task:
        type: string
        source: "state['task']"
        description: "Câu hỏi cần tìm evidence"
        validation: "Không được rỗng; nếu rỗng → retrieved_chunks=[], log error"

    optional:
      retrieval_top_k:
        type: integer
        source: "state.get('retrieval_top_k', 3)"
        default: 3
        min: 1
        max: 10
        description: "Số chunks tối đa muốn lấy về"

  # ── OUTPUT ───────────────────────────────────────────────────────────────
  # Worker CAM KẾT ghi đúng các fields này vào state.
  # Downstream workers (policy_tool, synthesis) phụ thuộc vào đây.

  output:
    retrieved_chunks:
      type: "list[ChunkDict]"
      required: true
      default_if_empty: "[]"
      sort_order: "giảm dần theo score (chunk[0] luôn là chunk liên quan nhất)"
      description: >
        Danh sách chunk tìm được. Rỗng nếu ChromaDB chưa sẵn sàng
        hoặc query thực sự không tìm thấy gì. KHÔNG fake chunks.

      item_schema:  # mỗi phần tử trong list phải có đủ 4 fields này
        text:
          type: string
          description: "Nội dung raw của chunk từ ChromaDB"

        source:
          type: string
          description: "Tên file gốc, e.g. 'sla_p1_2026.txt'"
          never: "null hoặc empty string — dùng 'unknown' nếu metadata thiếu"

        score:
          type: float
          range: "[0.0, 1.0]"
          precision: 4  # round đến 4 chữ số thập phân
          formula: "round(max(0.0, min(1.0, 1.0 - cosine_distance)), 4)"
          note: "ChromaDB trả về distance, phải convert sang similarity"

        metadata:
          type: dict
          description: "Metadata thô từ ChromaDB — có thể là {} nếu không có"
          never_null: true  # dùng {} thay vì None

    retrieved_sources:
      type: "list[str]"
      required: true
      default_if_empty: "[]"
      description: "Unique list tên file, giữ thứ tự xuất hiện đầu tiên trong retrieved_chunks"
      implementation: "list(dict.fromkeys(c['source'] for c in chunks))"
      example: "['sla_p1_2026.txt', 'access_control_sop.txt']"

    worker_io_logs:
      type: "list[LogEntry]"
      required: true
      write_mode: "append"  # KHÔNG ghi đè, chỉ append 1 entry mỗi lần gọi
      description: "Log entry cho lần chạy này — dùng để debug và trace"

      entry_schema:  # 1 entry gồm đúng 4 fields này
        worker:
          type: string
          value: "retrieval_worker"  # hardcoded — không đổi

        input:
          type: dict
          fields:
            task:
              type: string
              value: "câu hỏi đã xử lý"
            top_k:
              type: integer
              value: "số top_k thực tế đã dùng"

        output:
          type: "dict | null"
          null_when: "có exception trước khi query xong"
          fields_when_success:
            chunks_count:
              type: integer
              description: "Số chunks thực tế trả về"
            sources:
              type: "list[str]"
              description: "Danh sách file nguồn (= retrieved_sources)"
            top_score:
              type: "float | null"
              description: "Score của chunk đầu tiên; null nếu chunks_count=0"

        error:
          type: "dict | null"
          null_when: "không có lỗi"
          fields_when_error:
            code:
              type: string
              enum: ["RETRIEVAL_FAILED", "EMPTY_TASK", "CHROMA_UNAVAILABLE"]
            reason:
              type: string
              description: "str(exception) hoặc mô tả lỗi rõ ràng"

  # ── STATE MUTATIONS ───────────────────────────────────────────────────────
  # Danh sách CHÍNH XÁC những gì worker này được phép đọc và ghi.
  # Không được đọc/ghi ngoài danh sách này.

  state_mutations:
    reads:
      - "state['task']"
      - "state.get('retrieval_top_k', 3)"

    writes:
      - "state['retrieved_chunks']"         # ghi mới (overwrite ok)
      - "state['retrieved_sources']"        # ghi mới (overwrite ok)
      - "state['workers_called'].append('retrieval_worker')"
      - "state['worker_io_logs'].append(log_entry)"
      - "state['history'].append(summary_string)"

    initializes_if_missing:
      # Những fields này phải được setdefault trước khi append
      - "state['workers_called']  → []"
      - "state['history']         → []"
      - "state['worker_io_logs']  → []"

  # ── CONSTRAINTS ───────────────────────────────────────────────────────────
  # Những bất biến này phải đúng bất kể implementation thay đổi thế nào.
  # Nếu constraint nào bị vi phạm → coi là bug.

  constraints:
    data_integrity:
      - "retrieved_chunks KHÔNG BAO GIỜ chứa fake/hallucinated chunks"
      - "retrieved_chunks=[] là kết quả hợp lệ khi ChromaDB không có gì — không phải lỗi"
      - "score phải là similarity [0,1], KHÔNG phải raw cosine distance"
      - "chunk['source'] KHÔNG BAO GIỜ là null — dùng 'unknown' nếu metadata thiếu"
      - "chunk['metadata'] KHÔNG BAO GIỜ là null — dùng {} nếu thiếu"

    error_handling:
      - "run() KHÔNG BAO GIỜ raise exception ra ngoài — mọi lỗi phải catch trong try/except"
      - "Nếu ChromaDB chưa sẵn sàng → retrieved_chunks=[], ghi error vào log_entry"
      - "Nếu task rỗng → retrieved_chunks=[], ghi error code='EMPTY_TASK' vào log"

    stateless:
      - "Worker KHÔNG lưu state giữa các lần gọi"
      - "Worker KHÔNG đọc/ghi file hay biến module-level ngoài constants"
      - "Cùng input → cùng output (deterministic, trừ random fallback embedding)"

    log_completeness:
      - "Mọi lần gọi run() phải tạo đúng 1 log_entry và append vào worker_io_logs"
      - "log_entry phải có đủ 4 fields: worker, input, output, error"
      - "Nếu thành công: error=null, output=dict. Nếu lỗi: output=null, error=dict"
      - "Không được có cả output và error đều là null cùng lúc"

  # ── CHROMADB CONFIG ───────────────────────────────────────────────────────

  chroma_config:
    path: "./chroma_db"
    collection: "day09_docs"
    query_include: ["documents", "distances", "metadatas"]
    n_results_formula: "min(top_k, collection.count() or 1)"
    note: "collection.count() có thể trả 0 nếu empty — dùng 'or 1' để tránh lỗi"

  # ── TEST CASES ────────────────────────────────────────────────────────────
  # Chạy: python workers/retrieval.py
  # Pass khi: expect_source xuất hiện trong retrieved_sources

test_cases:
  - id: "TC-R01"
    query: "SLA ticket P1 là bao lâu?"
    expect_source: "sla-p1-2026.pdf"
  - id: "TC-R02"
    query: "Điều kiện được hoàn tiền flash sale là gì?"
    expect_source: "refund-v4.pdf"
  - id: "TC-R03"
    query: "Ai phê duyệt cấp quyền Level 3?"
    expect_source: "access-control-sop.md"
  - id: "TC-R04"
    query: "Nhân viên thử việc được làm remote không?"
    expect_source: "leave-policy-2026.pdf"
  - id: "TC-R05"
    query: "Mật khẩu cần đổi sau bao nhiêu ngày?"
    expect_source: "helpdesk-faq.md"
  # ── IMPLEMENTATION STATUS ─────────────────────────────────────────────────

  implementation:
    status: "done"
    file: "workers/retrieval.py"
    standalone_test: "python workers/retrieval.py"
    embedding_active: "all-MiniLM-L6-v2 (sentence-transformers)"
    chroma_status: "built"


